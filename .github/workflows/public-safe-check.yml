name: Public Safe Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate export scaffolding
        run: python3 scripts/validate-export.py

      - name: Check for sensitive content
        run: python3 scripts/check-sensitive-content.py

      - name: Check token budget
        run: python3 scripts/check-token-budget.py
